name: Velo3D
kind: company
description: Velo3D builds metal additive-manufacturing systems for aerospace, defense,
  and energy - the Sapphire family of laser powder bed fusion printers, Flow print-preparation
  software, the Assure quality-assurance and control system, all powered by the Intelligent
  Fusion manufacturing process. These are enterprise hardware and software products;
  Velo3D does not publish a documented public developer API.

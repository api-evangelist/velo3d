description: >-
  Velo3D does not publish a documented public developer API, so there are no
  HTTP rate limits, quotas, or throttling policies to document. The Sapphire
  printers, Flow software, and Assure dashboard are enterprise hardware and
  software products operated on customer or service-bureau premises rather than
  consumed as a metered cloud API. This artifact is not reconciled because no
  public API rate-limiting surface exists.
notes: >-
  No public API exists; any operational throughput limits are physical
  (printer build volume, laser count, layer time) rather than API rate limits.
  Revisit if Velo3D documents a public or partner API.

description: >-
  FinOps view of Velo3D spend. Velo3D is not a usage-based cloud API; cost is
  driven by enterprise capital purchase of Sapphire printers and bundled
  software (Flow, Assure, Intelligent Fusion), by per-project printing
  services, and by ongoing operating inputs such as metal powder, inert gas,
  optics, maintenance, and energy. There is no metered API billing to map to
  FOCUS usage records. This artifact is not reconciled because no public API
  billing surface exists; the meters below describe physical manufacturing
  cost drivers rather than API consumption.
notes: >-
  No public API or usage-based API billing exists. Cost management here is
  capital-equipment and manufacturing-operations FinOps, not cloud-API FinOps.
  Verify commercial terms with Velo3D sales during reconciliation.
sources:
- https://velo3d.com/
- https://support.velo3d.com/

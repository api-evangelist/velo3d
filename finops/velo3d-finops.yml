meters:
- name: printer_capital
  description: Capital cost of Sapphire-family printers and bundled software, amortized over service life.
  unit: systems
  aggregation: sum
  dimensions:
  - account
  - printer_model
- name: metal_powder
  description: Metal powder consumed per build, a primary recurring operating cost.
  unit: kilograms
  aggregation: sum
  dimensions:
  - account
  - material
- name: inert_gas
  description: Inert process gas (e.g. argon) consumed during builds.
  unit: cubic_meters
  aggregation: sum
  dimensions:
  - account
- name: machine_hours
  description: Printer build hours, driving energy, optics wear, and maintenance cost.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - printer_model
- name: printing_services
  description: Per-project / per-part charges for parts produced as a service by Velo3D or its network.
  unit: parts
  aggregation: sum
  dimensions:
  - account
  - project
principles:
- name: Visibility
  description: Track powder, gas, energy, and machine-hour consumption per build and per program.
- name: Allocation
  description: Allocate printer capital and per-build operating cost to programs and cost centers.
- name: Optimization
  description: Use support-free Intelligent Fusion design to cut material and post-processing; maximize build-plate packing and uptime.
- name: Accountability
  description: Assign program owners; review per-part cost against quotes and budgets.
maintainers:

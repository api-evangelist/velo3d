  pricingCategory: Enterprise
  billingFrequency: Contract
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
focusColumns:
  ServiceName: Velo3D Metal Additive Manufacturing
  ServiceCategory: Manufacturing
